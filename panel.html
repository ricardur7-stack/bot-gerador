<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador De Keys</title>

<style>
body {
  background: #121212;
  color: white;
  font-family: Arial;
  text-align: center;
}

button, select {
  padding: 10px;
  margin: 10px;
}

.box {
  background: #1e1e1e;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  border-radius: 10px;
}

ul {
  text-align: left;
}
</style>
</head>

<body>

<h1>Gerador De Keys</h1>

<button onclick="logout()">Sair</button>

<div class="box">
  <h3>Gerar Key</h3>

  <select id="duracao">
    <option value="1">1 dia</option>
    <option value="7">7 dias</option>
    <option value="30">30 dias</option>
  </select>

  <br>

  <button onclick="gerarKey()">Gerar</button>

  <p id="saida"></p>
</div>

<!-- 🔥 ESTOQUE EDITÁVEL NO HTML -->
<div class="box">
  <h3>Estoque (edite aqui)</h3>

  <p><strong>1 dia:</strong></p>
  <ul id="keys1">
    <li>KEY-AAA-1D</li>
    <li>KEY-BBB-1D</li>
  </ul>

  <p><strong>7 dias:</strong></p>
  <ul id="keys7">
    <li>KEY-CCC-7D</li>
    <li>KEY-DDD-7D</li>
  </ul>

  <p><strong>30 dias:</strong></p>
  <ul id="keys30">
    <li>KEY-EEE-30D</li>
    <li>KEY-FFF-30D</li>
  </ul>
</div>

<script>

// 🔒 Proteção login
if (localStorage.getItem("logado") !== "true") {
  window.location.href = "index.html";
}

// 🔑 Gerar key pegando do HTML
function gerarKey() {
  let tipo = document.getElementById("duracao").value;
  let lista;

  if (tipo == "1") lista = document.getElementById("keys1");
  if (tipo == "7") lista = document.getElementById("keys7");
  if (tipo == "30") lista = document.getElementById("keys30");

  let itens = lista.getElementsByTagName("li");

  if (itens.length > 0) {
    let key = itens[0].innerText;
    itens[0].remove(); // remove do estoque
    document.getElementById("saida").innerText = "Key: " + key;
  } else {
    document.getElementById("saida").innerText = "Sem estoque!";
  }
}

// 🚪 Logout
function logout() {
  localStorage.removeItem("logado");
  window.location.href = "index.html";
}

</script>

</body>
</html>
