<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VETRIX</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Arial;}
body{background:#000;color:#fff;}

header{
  text-align:center;
  padding:20px;
  font-size:26px;
  color:#ff1a1a;
  text-shadow:0 0 20px red;
}

/* TABS */
.tabs{display:flex;gap:10px;padding:10px;}
.tab{
  flex:1;
  padding:12px;
  border-radius:18px;
  background:#0a0a0a;
  text-align:center;
  color:#777;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.tab.active{
  color:red;
  box-shadow:0 0 20px red;
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:#050505;
  border:1px solid #111;
}

.title{
  font-size:18px;
  margin-bottom:5px;
  display:flex;
  align-items:center;
  gap:6px;
}

.title i{
  width:18px;
  height:18px;
  color:red;
}

.desc{
  color:#888;
  font-size:14px;
  margin-bottom:12px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border-radius:15px;
  border:none;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#660000);
  color:#fff;
}

/* FPS */
.fps{display:flex;gap:10px;}
.fps div{
  flex:1;
  padding:15px;
  border-radius:15px;
  border:1px solid #222;
  text-align:center;
  color:#aaa;
  cursor:pointer;
}
.fps div.active{
  border:1px solid red;
  color:red;
  box-shadow:0 0 15px red;
}

/* PROGRESS */
.progress-bar{
  height:6px;
  background:#222;
  border-radius:10px;
  margin:10px 0;
  overflow:hidden;
}
.progress{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#ff0000,#ff6600);
}

.status{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#ff6600;
}
</style>
</head>

<body>

<header>VETRIX</header>

<div class="tabs">
  <div class="tab active">
    <i data-lucide="zap"></i>
    <span>Performance</span>
  </div>
  <div class="tab" onclick="go('mira.html')">
    <i data-lucide="crosshair"></i>
    <span>Mira</span>
  </div>
  <div class="tab" onclick="go('sensi.html')">
    <i data-lucide="sparkles"></i>
    <span>Sensi</span>
  </div>
</div>

<!-- PING -->
<div class="card">
  <div class="title"><i data-lucide="wifi"></i> Melhorar Ping</div>
  <div class="desc">Reduz a latência e melhora a conexão durante a partida.</div>

  <div id="pingBox" style="display:none;">
    <div class="progress-bar"><div class="progress" id="pingBar"></div></div>
    <div class="status"><span id="pingStatus"></span><span id="pingPercent">0%</span></div>
  </div>

  <button class="btn" onclick="startPing()">ATIVAR</button>
</div>

<!-- FPS -->
<div class="card">
  <div class="title"><i data-lucide="monitor"></i> Aumentar FPS</div>
  <div class="desc">Aumenta a taxa de quadros e melhora a fluidez.</div>

  <div class="fps">
    <div onclick="startFPS(this,60)">60</div>
    <div onclick="startFPS(this,120)">120</div>
    <div onclick="startFPS(this,240)">240</div>
  </div>

  <div id="fpsBox" style="display:none;">
    <div class="progress-bar"><div class="progress" id="fpsBar"></div></div>
    <div class="status"><span id="fpsStatus"></span><span id="fpsPercent">0%</span></div>
  </div>
</div>

<!-- OTIMIZAÇÃO -->
<div class="card">
  <div class="title"><i data-lucide="rocket"></i> Otimização do Sistema</div>
  <div class="desc">Limpeza profunda e melhoria geral do desempenho.</div>

  <div id="optBox" style="display:none;">
    <div class="progress-bar"><div class="progress" id="optBar"></div></div>
    <div class="status"><span id="optStatus"></span><span id="optPercent">0%</span></div>
  </div>

  <button class="btn" onclick="startOpt()">OTIMIZAR</button>
</div>

<script>
function go(p){location.href=p;}

function run(bar,percent,status,done){
  let p=0;

  let i=setInterval(()=>{
    p+=Math.floor(Math.random()*7)+3;
    if(p>100)p=100;

    bar.style.width=p+"%";
    percent.innerText=p+"%";

    if(p===100){
      clearInterval(i);
      status.innerText=done;
      status.style.color="#00ff66";
    }
  },200);
}

function startPing(){
  document.getElementById("pingBox").style.display="block";

  run(
    document.getElementById("pingBar"),
    document.getElementById("pingPercent"),
    document.getElementById("pingStatus"),
    "✔ Ping otimizado"
  );
}

function startFPS(el,val){
  document.querySelectorAll('.fps div').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');

  document.getElementById("fpsBox").style.display="block";

  run(
    document.getElementById("fpsBar"),
    document.getElementById("fpsPercent"),
    document.getElementById("fpsStatus"),
    "✔ "+val+" FPS ativado"
  );
}

function startOpt(){
  document.getElementById("optBox").style.display="block";

  let status=document.getElementById("optStatus");

  let p=0;
  let bar=document.getElementById("optBar");
  let percent=document.getElementById("optPercent");

  let steps=[
    "Limpando cache...",
    "Removendo arquivos...",
    "Otimizando sistema...",
    "Finalizando..."
  ];

  let i=setInterval(()=>{
    p+=Math.floor(Math.random()*7)+3;
    if(p>100)p=100;

    bar.style.width=p+"%";
    percent.innerText=p+"%";

    if(p<30) status.innerText=steps[0];
    else if(p<60) status.innerText=steps[1];
    else if(p<90) status.innerText=steps[2];
    else status.innerText=steps[3];

    if(p===100){
      clearInterval(i);
      status.innerText="✔ Sistema otimizado";
      status.style.color="#00ff66";
    }
  },200);
}

lucide.createIcons();
</script>

</body>
</html>
