<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VETRIX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* TOPO */
.topo {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  color: #ff2a2a;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 20px;
  background: #0d0d0d;
  border: 1px solid #222;
  color: #aaa;
  cursor: pointer;
}

.tab.active {
  background: #1a0000;
  border: 1px solid red;
  color: red;
  box-shadow: 0 0 10px red;
}

/* CONTEÚDO */
.content { display: none; }
.content.active { display: block; }

/* CARD */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: #0a0a0a;
  border: 1px solid #111;
}

/* BOTÕES */
.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, red, #ff3b3b);
  color: white;
  font-weight: bold;
  margin-top: 10px;
  box-shadow: 0 0 20px red;
  cursor: pointer;
}

/* FPS */
.fps button {
  width: 30%;
  padding: 10px;
  margin: 5px;
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  color: white;
}

/* SWITCH */
.switch {
  float: right;
}

.switch input { display: none; }

.slider {
  width: 40px;
  height: 20px;
  background: #333;
  border-radius: 20px;
  position: relative;
  display: inline-block;
}

.slider::before {
  content: "";
  width: 18px;
  height: 18px;
  background: white;
  position: absolute;
  top: 1px;
  left: 1px;
  border-radius: 50%;
  transition: .3s;
}

input:checked + .slider {
  background: red;
}

input:checked + .slider::before {
  transform: translateX(20px);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 15px;
}

.player {
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #333;
  cursor: pointer;
}

/* SELECIONADO */
.player.active {
  border: 1px solid red;
  box-shadow: 0 0 10px red;
}

/* CARD SENSI */
.result-card {
  margin: 15px;
  border-radius: 20px;
  border: 1px solid #222;
  overflow: hidden;
  animation: fade 0.3s;
}

.header-sensi {
  padding: 15px;
  font-weight: bold;
  background: linear-gradient(90deg, red, transparent);
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  background: #050505;
}

.value {
  color: #ff2a2a;
  font-weight: bold;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  display: none;
}

/* ANIMAÇÃO */
@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="topo">VETRIX</div>

<div class="tabs">
  <div class="tab active" onclick="trocar('perf', this)">Performance</div>
  <div class="tab" onclick="trocar('mira', this)">Mira</div>
  <div class="tab" onclick="trocar('gerador', this)">Gerador</div>
</div>

<!-- PERFORMANCE -->
<div id="perf" class="content active">
  <div class="card">
    <h3>Melhorar Ping</h3>
    <button class="btn" onclick="toast('Ping otimizado')">ATIVAR</button>
  </div>

  <div class="card">
    <h3>Aumentar FPS</h3>
    <div class="fps">
      <button onclick="toast('60 FPS')">60 FPS</button>
      <button onclick="toast('120 FPS')">120 FPS</button>
      <button onclick="toast('240 FPS')">240 FPS</button>
    </div>
  </div>

  <div class="card">
    <h3>Otimização</h3>
    <button class="btn" onclick="toast('Sistema otimizado')">OTIMIZAR</button>
  </div>
</div>

<!-- MIRA -->
<div id="mira" class="content">
  <div class="card">
    Calibrar Sensibilidade
    <label class="switch">
      <input type="checkbox" onchange="toast(this.checked ? 'Ativado' : 'Desativado')">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    Reduzir Recuo
    <label class="switch">
      <input type="checkbox" onchange="toast(this.checked ? 'Ativado' : 'Desativado')">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    Aumentar Precisão
    <label class="switch">
      <input type="checkbox" onchange="toast(this.checked ? 'Ativado' : 'Desativado')">
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn" onclick="toast('Ajustes aplicados')">APLICAR AJUSTES</button>
</div>

<!-- GERADOR -->
<div id="gerador" class="content">

  <div class="grid">
    <div class="player" onclick="select(this)">PHZIN</div>
    <div class="player" onclick="select(this)">Two9</div>
    <div class="player" onclick="select(this)">Marechal</div>
    <div class="player" onclick="select(this)">Freitas</div>
  </div>

  <button class="btn" onclick="gerar()">GERAR SENSI</button>

  <div id="resultado"></div>
</div>

<div id="toast" class="toast"></div>

<script>
function trocar(id, el){
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none", 2000);
}

let player = "PHZIN";

function select(el){
  document.querySelectorAll('.player').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  player = el.innerText;
  toast("Selecionado: " + player);
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function gerar(){
  let html = `
  <div class="result-card">
    <div class="header-sensi">🔥 Sensibilidade de ${player}</div>

    <div class="item"><span>Geral</span><span class="value">${rand(180,200)}</span></div>
    <div class="item"><span>Red Dot</span><span class="value">${rand(150,180)}</span></div>
    <div class="item"><span>Mira 2x</span><span class="value">${rand(110,140)}</span></div>
    <div class="item"><span>Mira 4x</span><span class="value">${rand(110,140)}</span></div>
    <div class="item"><span>AWM / Sniper</span><span class="value">${rand(150,180)}</span></div>
    <div class="item"><span>Olhadinha</span><span class="value">${rand(140,170)}</span></div>
  </div>
  `;
  document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
