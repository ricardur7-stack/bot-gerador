<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,Arial;
}

body{
  background:#000;
  color:#fff;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:26px;
  color:#ff1a1a;
  font-weight:bold;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px red; }
  to{ text-shadow:0 0 25px red; }
}

/* SWIPE */
.tabs-wrapper{
  overflow-x:auto;
  padding:10px;
}

.tabs{
  display:flex;
  gap:10px;
}

.tab{
  min-width:140px;
  padding:12px;
  border-radius:20px;
  background:#0a0a0a;
  border:1px solid #111;
  text-align:center;
  color:#777;
}

.tab.active{
  color:#ff2a2a;
  border:1px solid red;
  box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:#050505;
  border:1px solid #111;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(255,0,0,0.3);
}

/* TEXT */
.title{font-size:18px;margin-bottom:5px;}
.desc{color:#888;font-size:14px;margin-bottom:10px;}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border-radius:15px;
  border:none;
  font-weight:bold;
  font-size:16px;
  background:linear-gradient(90deg,#ff0000,#660000);
  color:#fff;
  box-shadow:0 0 20px rgba(255,0,0,0.6);
}

.btn:active{transform:scale(0.93);}

/* FPS */
.fps{display:flex;gap:10px;}
.fps div{
  flex:1;
  padding:15px;
  border-radius:15px;
  border:1px solid #222;
  text-align:center;
  color:#aaa;
}
.fps div.active{
  border:1px solid red;
  color:red;
  box-shadow:0 0 15px red;
}

/* PROGRESS */
.progress-bar{
  width:100%;
  height:8px;
  background:#222;
  border-radius:10px;
  margin:10px 0;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ff0000,#ff6600);
}

/* STATUS */
.status{
  color:#ff6600;
  font-size:14px;
  margin-bottom:10px;
}

/* SUCCESS */
.success{
  background:linear-gradient(90deg,#00ff66,#00aa44)!important;
  box-shadow:0 0 20px #00ff66!important;
}

/* LOADING */
.loading{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid #111;
  border-top:6px solid red;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* ICON */
i{width:20px;height:20px;color:red;margin-right:8px;}
</style>
</head>

<body>

<header>VETRIX</header>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs">
    <div class="tab active" onclick="goTo(0)">⚡ Performance</div>
    <div class="tab" onclick="goTo(1)">🎯 Mira</div>
    <div class="tab" onclick="goTo(2)">✨ Sensi</div>
  </div>
</div>

<!-- PING -->
<div class="card">
  <div class="title"><i data-lucide="wifi"></i> Melhorar Ping</div>
  <div class="desc">Reduzir latência</div>
  <button class="btn" onclick="fakeLoad('Ping otimizado 🔥')">ATIVAR</button>
</div>

<!-- FPS -->
<div class="card">
  <div class="title"><i data-lucide="monitor"></i> Aumentar FPS</div>
  <div class="desc">Escolha FPS</div>
  <div class="fps">
    <div onclick="fps(this)">60</div>
    <div onclick="fps(this)">120</div>
    <div onclick="fps(this)">240</div>
  </div>
</div>

<!-- OTIMIZAÇÃO INSANA -->
<div class="card">
  <div class="title"><i data-lucide="rocket"></i> Otimização do Jogo</div>
  <div class="desc" id="optDesc">Limpeza completa do sistema</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="status" id="statusText"></div>

  <button class="btn" id="optBtn" onclick="startOpt()">
    OTIMIZAR AGORA
  </button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="msg">Inicializando...</p>
</div>

<script>
let current=0;

function goTo(i){
  if(i===0) location.href="index.html";
  if(i===1) location.href="mira.html";
  if(i===2) location.href="sensi.html";
}

/* SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50 && current<2) goTo(current+1);
  if(endX-startX>50 && current>0) goTo(current-1);
});

/* FPS */
function fps(el){
  document.querySelectorAll('.fps div').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  navigator.vibrate(40);
}

/* PING */
function fakeLoad(text){
  navigator.vibrate(100);

  let l=document.getElementById("loading");
  let msg=document.getElementById("msg");

  l.style.display="flex";

  setTimeout(()=>msg.innerText="Conectando...",800);
  setTimeout(()=>msg.innerText="Aplicando...",1600);
  setTimeout(()=>{
    l.style.display="none";
    alert(text);
  },2600);
}

/* OTIMIZAÇÃO INSANA */
function startOpt(){
  let btn=document.getElementById("optBtn");
  let bar=document.getElementById("progress");
  let status=document.getElementById("statusText");
  let desc=document.getElementById("optDesc");

  navigator.vibrate(100);

  btn.innerHTML="⏳ OTIMIZANDO...";
  btn.disabled=true;

  let steps=[
    "Limpando cache do sistema...",
    "Removendo arquivos inúteis...",
    "Otimizando memória RAM...",
    "Finalizando otimização..."
  ];

  let p=0,i=0;

  let inter=setInterval(()=>{
    p+=25;
    bar.style.width=p+"%";
    status.innerText=steps[i];
    i++;

    if(p>=100){
      clearInterval(inter);

      setTimeout(()=>{
        status.innerText="✔ Sistema otimizado";
        status.style.color="#00ff66";

        btn.innerHTML="✔ OTIMIZADO";
        btn.classList.add("success");

        desc.innerText="Desempenho máximo ativado 🚀";
        navigator.vibrate([50,50,50]);
      },500);
    }
  },900);
}

lucide.createIcons();
</script>

</body>
</html>
