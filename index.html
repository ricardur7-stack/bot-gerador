<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Aura Gerador</title>

<style>
body {
  background: #121212;
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 100px;
}

.box {
  background: #1e1e1e;
  padding: 30px;
  width: 300px;
  margin: auto;
  border-radius: 10px;
}

input {
  padding: 10px;
  margin: 10px;
  width: 80%;
}

button {
  padding: 10px;
  width: 85%;
  background: #00ff99;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="box">
  <h1>Login</h1>

  <input type="text" id="user" placeholder="Usuário"><br>
  <input type="password" id="pass" placeholder="Senha"><br>

  <button onclick="login()">Entrar</button>

  <p id="msg"></p>
</div>

<script>

// 🔐 ALTERE AQUI
const USER = "adm";
const PASS = "202010";

function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u === USER && p === PASS) {
    localStorage.setItem("logado", "true");
    window.location.href = "panel.html";
  } else {
    document.getElementById("msg").innerText = "Usuário ou senha inválidos!";
  }
}

</script>

</body>
</html>
