<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VETRIX</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial;
  margin: 0;
}

/* TOPO */
.topo {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  color: #ff3b3b;
  letter-spacing: 2px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 20px;
  background: #0d0d0d;
  border: 1px solid #222;
  color: #aaa;
  cursor: pointer;
}

.tab.active {
  background: #1a0000;
  border: 1px solid red;
  color: red;
  box-shadow: 0 0 10px red;
}

/* BOTÃO */
.btn {
  width: 90%;
  margin: 15px auto;
  display: block;
  padding: 16px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(45deg, #ff0000, #ff4d4d);
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(255,0,0,0.7);
  cursor: pointer;
}

/* CARD SENSI */
.card {
  width: 90%;
  margin: 15px auto;
  border-radius: 20px;
  border: 1px solid #222;
  background: linear-gradient(180deg, #0a0a0a, #000);
  overflow: hidden;
}

/* HEADER CARD */
.card-header {
  padding: 15px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff0000, transparent);
}

/* LINHAS */
.item {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  background: #050505;
  border: 1px solid #111;
}

/* TEXTO */
.label {
  color: #aaa;
}

.value {
  color: #ff3b3b;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  color: #555;
  font-size: 12px;
  margin-top: 20px;
}

/* ANIMAÇÃO */
.fade {
  animation: fade 0.3s ease-in-out;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>

</head>

<body>

<div class="topo">VETRIX</div>

<div class="tabs">
  <div class="tab active">Gerador</div>
</div>

<button class="btn" onclick="gerarSensi()">🎯 GERAR SENSI</button>

<div id="resultado"></div>

<div class="footer">
Aplicativo de simulação e personalização visual de configurações.
</div>

<script>
function random(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gerarSensi(){
  let geral = random(180, 200);
  let red = random(150, 180);
  let mira2 = random(110, 140);
  let mira4 = random(110, 140);
  let awm = random(150, 180);
  let olhadinha = random(140, 170);

  let html = `
  <div class="card fade">
    <div class="card-header">🔥 Sensibilidade Gerada</div>

    <div class="item"><span class="label">Geral</span><span class="value">${geral}</span></div>
    <div class="item"><span class="label">Red Dot</span><span class="value">${red}</span></div>
    <div class="item"><span class="label">Mira 2x</span><span class="value">${mira2}</span></div>
    <div class="item"><span class="label">Mira 4x</span><span class="value">${mira4}</span></div>
    <div class="item"><span class="label">AWM / Sniper</span><span class="value">${awm}</span></div>
    <div class="item"><span class="label">Olhadinha</span><span class="value">${olhadinha}</span></div>
  </div>
  `;

  document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
