<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VETRIX SENSI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  text-align: center;
}

/* Título */
.title {
  font-size: 40px;
  font-weight: bold;
  margin-top: 40px;
  background: linear-gradient(90deg, orange, red);
  -webkit-background-clip: text;
  color: transparent;
}

/* Botões de aba */
.tabs {
  margin-top: 30px;
}

.tabs button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: orange;
  cursor: pointer;
}

.tabs button.active {
  background: orange;
  color: black;
}

/* Conteúdo */
.content {
  margin-top: 30px;
  display: none;
}

.active-content {
  display: block;
}

/* Botão principal */
.main-btn {
  padding: 15px 50px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(135deg, orange, red);
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

/* Card */
.card {
  background: #111;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

/* Inputs */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}
</style>
</head>

<body>

<div class="title">VETRIX SENSI</div>

<div class="tabs">
  <button onclick="openTab('home')" class="active">Home</button>
  <button onclick="openTab('sensi')">Gerar Sensi</button>
  <button onclick="openTab('config')">Config</button>
</div>

<!-- HOME -->
<div id="home" class="content active-content">
  <div class="card">
    <h2>Bem-vindo</h2>
    <p>"a evolução da sensi não tem limites"</p>
    <button class="main-btn" onclick="openTab('sensi')">INICIAR</button>
  </div>
</div>

<!-- SENSI -->
<div id="sensi" class="content">
  <div class="card">
    <h2>Gerador de Sensibilidade</h2>
    <button class="main-btn" onclick="gerarSensi()">GERAR</button>

    <p id="resultado"></p>
  </div>
</div>

<!-- CONFIG -->
<div id="config" class="content">
  <div class="card">
    <h2>Configurações</h2>

    <input type="number" id="dpi" placeholder="DPI">
    <input type="number" id="fps" placeholder="FPS">

    <br>

    <button class="main-btn" onclick="aplicarConfig()">APLICAR</button>

    <p id="status"></p>
  </div>
</div>

<script>
function openTab(tab) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active-content'));
  document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));

  document.getElementById(tab).classList.add('active-content');
  event.target.classList.add('active');
}

// GERAR SENSI
function gerarSensi() {
  let sensi = {
    geral: Math.floor(Math.random() * 100),
    redDot: Math.floor(Math.random() * 100),
    x2: Math.floor(Math.random() * 100),
    x4: Math.floor(Math.random() * 100),
    awm: Math.floor(Math.random() * 100)
  };

  document.getElementById("resultado").innerHTML = `
    Geral: ${sensi.geral} <br>
    Red Dot: ${sensi.redDot} <br>
    2x: ${sensi.x2} <br>
    4x: ${sensi.x4} <br>
    AWM: ${sensi.awm}
  `;
}

// CONFIG
function aplicarConfig() {
  let dpi = document.getElementById("dpi").value;
  let fps = document.getElementById("fps").value;

  document.getElementById("status").innerText =
    "Config aplicada! DPI: " + dpi + " | FPS: " + fps;
}
</script>

</body>
</html>
