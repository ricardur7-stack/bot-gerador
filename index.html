<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabor Fanta Sensi</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial;
  margin: 0;
}

/* TOPO */
.topo {
  text-align: center;
  padding: 20px;
  color: #ff2a2a;
  font-weight: bold;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 20px;
  background: #111;
  border: 1px solid #333;
  cursor: pointer;
}

.active {
  background: #1a0000;
  border: 1px solid red;
  color: red;
  box-shadow: 0 0 10px red;
}

/* CONTEÚDO */
.content {
  display: none;
}

.content.active {
  display: block;
}

/* CARD */
.card {
  background: #0d0d0d;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  border: 1px solid #1a1a1a;
}

/* BOTÃO */
.btn {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, red, #ff3b3b);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px red;
}

/* SWITCH */
.switch {
  float: right;
}

.slider {
  width: 40px;
  height: 20px;
  background: #333;
  border-radius: 20px;
  position: relative;
  display: inline-block;
  cursor: pointer;
}

.slider::before {
  content: "";
  width: 18px;
  height: 18px;
  background: white;
  position: absolute;
  top: 1px;
  left: 1px;
  border-radius: 50%;
  transition: .3s;
}

input {
  display: none;
}

input:checked + .slider {
  background: red;
}

input:checked + .slider::before {
  transform: translateX(20px);
}

/* FPS */
.fps button {
  width: 30%;
  margin: 5px;
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 15px;
}

.player {
  padding: 12px;
  border: 1px solid #333;
  text-align: center;
  border-radius: 10px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="topo">SABOR FANTA SENSI</div>

<div class="tabs">
  <div class="tab active" onclick="trocarAba('perf', this)">Performance</div>
  <div class="tab" onclick="trocarAba('mira', this)">Mira</div>
  <div class="tab" onclick="trocarAba('gerador', this)">Gerador</div>
</div>

<!-- PERFORMANCE -->
<div id="perf" class="content active">
  <div class="card">
    <h3>Melhorar Ping</h3>
    <button class="btn" onclick="acao('Ping otimizado!')">ATIVAR</button>
  </div>

  <div class="card">
    <h3>Aumentar FPS</h3>
    <div class="fps">
      <button onclick="acao('60 FPS ativado')">60 FPS</button>
      <button onclick="acao('120 FPS ativado')">120 FPS</button>
      <button onclick="acao('240 FPS ativado')">240 FPS</button>
    </div>
  </div>

  <div class="card">
    <h3>Otimização</h3>
    <button class="btn" onclick="acao('Sistema otimizado!')">OTIMIZAR</button>
  </div>
</div>

<!-- MIRA -->
<div id="mira" class="content">
  <div class="card">
    <h3>Calibrar Sensibilidade</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggle(this, 'Sensibilidade ativada')">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <h3>Reduzir Recuo</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggle(this, 'Recuo reduzido')">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <h3>Aumentar Precisão</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggle(this, 'Precisão aumentada')">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <h3>Input Lag</h3>
    <label class="switch">
      <input type="checkbox" onchange="toggle(this, 'Input lag removido')">
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn" onclick="acao('Ajustes aplicados!')">APLICAR AJUSTES</button>
</div>

<!-- GERADOR -->
<div id="gerador" class="content">
  <div class="grid">
    <div class="player" onclick="selectPlayer(this)">Two9</div>
    <div class="player" onclick="selectPlayer(this)">Marechal</div>
    <div class="player" onclick="selectPlayer(this)">Freitas</div>
    <div class="player" onclick="selectPlayer(this)">Blackn444</div>
  </div>

  <button class="btn" onclick="gerar()">GERAR SENSI</button>
</div>

<div id="toast" class="toast"></div>

<script>
function trocarAba(id, el){
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function acao(msg){
  mostrarToast(msg);
}

function toggle(el, msg){
  if(el.checked){
    mostrarToast(msg);
  } else {
    mostrarToast('Desativado');
  }
}

let playerSelecionado = null;

function selectPlayer(el){
  document.querySelectorAll('.player').forEach(p => p.style.border="1px solid #333");
  el.style.border = "1px solid red";
  playerSelecionado = el.innerText;
  mostrarToast("Selecionado: " + playerSelecionado);
}

function gerar(){
  if(playerSelecionado){
    mostrarToast("Sensi gerada para " + playerSelecionado);
  } else {
    mostrarToast("Selecione um jogador");
  }
}

function mostrarToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}
</script>

</body>
</html>
