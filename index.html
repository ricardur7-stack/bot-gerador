<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, Arial;
}

body {
  background:#000;
  color:#fff;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  font-size:26px;
  color:#ff1a1a;
  font-weight:bold;
  animation:glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px red; }
  to { text-shadow:0 0 25px red; }
}

/* SWIPE TABS */
.tabs-wrapper {
  overflow-x:auto;
  padding:10px;
}

.tabs-wrapper::-webkit-scrollbar {
  display:none;
}

.tabs {
  display:flex;
  gap:10px;
  min-width:100%;
}

.tab {
  min-width:140px;
  flex-shrink:0;
  padding:12px;
  border-radius:20px;
  background:#0a0a0a;
  border:1px solid #111;
  text-align:center;
  color:#777;
  transition:0.3s;
}

.tab.active {
  color:#ff2a2a;
  border:1px solid red;
  box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* CARDS */
.card {
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:#050505;
  border:1px solid #111;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(255,0,0,0.25);
}

/* TEXT */
.title {
  font-size:18px;
  margin-bottom:5px;
}

.desc {
  color:#888;
  font-size:14px;
  margin-bottom:15px;
}

/* BUTTON */
.btn {
  width:100%;
  padding:16px;
  border-radius:15px;
  border:none;
  font-weight:bold;
  font-size:16px;
  background:linear-gradient(90deg,#ff0000,#660000);
  color:#fff;
  box-shadow:0 0 25px rgba(255,0,0,0.6);
  cursor:pointer;
  transition:0.15s;
}

.btn:active {
  transform:scale(0.93);
}

/* FPS */
.fps {
  display:flex;
  gap:10px;
}

.fps div {
  flex:1;
  padding:15px;
  border-radius:15px;
  border:1px solid #222;
  text-align:center;
  color:#aaa;
}

.fps div.active {
  border:1px solid red;
  color:red;
  box-shadow:0 0 20px red;
}

/* LOADING */
.loading {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid #111;
  border-top:6px solid red;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* ICON */
i {
  width:20px;
  height:20px;
  margin-right:8px;
  color:red;
}
</style>
</head>

<body>

<header>VETRIX</header>

<!-- SWIPE TABS -->
<div class="tabs-wrapper">
  <div class="tabs">
    <div class="tab active" onclick="goTo(0)">⚡ Performance</div>
    <div class="tab" onclick="goTo(1)">🎯 Mira</div>
    <div class="tab" onclick="goTo(2)">✨ Sensi</div>
  </div>
</div>

<!-- CARDS -->
<div class="card">
  <div class="title"><i data-lucide="wifi"></i> Melhorar Ping</div>
  <div class="desc">Reduzir latência</div>
  <button class="btn" onclick="fakeLoad('Ping otimizado 🔥')">ATIVAR</button>
</div>

<div class="card">
  <div class="title"><i data-lucide="monitor"></i> Aumentar FPS</div>
  <div class="desc">Escolha FPS</div>
  <div class="fps">
    <div onclick="fps(this)">60</div>
    <div onclick="fps(this)">120</div>
    <div onclick="fps(this)">240</div>
  </div>
</div>

<div class="card">
  <div class="title"><i data-lucide="rocket"></i> Otimização</div>
  <div class="desc">Limpeza completa</div>
  <button class="btn" onclick="fakeLoad('Sistema otimizado 🚀')">OTIMIZAR</button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="msg">Inicializando...</p>
</div>

<script>
let current = 0;

function goTo(index){
  current = index;

  if(index === 0) window.location.href = "index.html";
  if(index === 1) window.location.href = "mira.html";
  if(index === 2) window.location.href = "sensi.html";
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    if(current < 2) goTo(current + 1);
  }

  if(endX - startX > 50){
    if(current > 0) goTo(current - 1);
  }
});

/* FPS */
function fps(el){
  document.querySelectorAll('.fps div').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  navigator.vibrate(40);
}

/* LOADING */
function fakeLoad(text){
  navigator.vibrate(100);

  let l = document.getElementById("loading");
  let msg = document.getElementById("msg");

  l.style.display="flex";

  setTimeout(()=>{ msg.innerText="Conectando..."; },800);
  setTimeout(()=>{ msg.innerText="Aplicando..."; },1600);
  setTimeout(()=>{ msg.innerText="Finalizando..."; },2400);

  setTimeout(()=>{
    l.style.display="none";
    alert(text);
  },3200);
}

lucide.createIcons();
</script>

</body>
</html>
